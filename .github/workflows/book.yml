name: Deploy Book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "book/**"
      - "crates/web-app/**"
      - "crates/render-core/**"
      - "crates/sim-core/**"
  workflow_dispatch:

permissions: {}  # deny all at workflow level; grant per job

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo tools
        id: cache-tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-katex
            ~/.cargo/bin/wasm-pack
          key: cargo-tools-${{ runner.os }}-mdbook-0.4.47-katex-0.9.4-wasmpack-0.14.0

      - name: Install mdBook
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install mdbook --version "0.4.47"

      - name: Install mdbook-katex
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install mdbook-katex --version "0.9.4"

      - name: Install wasm-pack
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version "0.14.0"

      - name: Build WASM web-app
        run: cd crates/web-app && wasm-pack build --target web --release

      - name: Build book
        run: mdbook build book/

      - name: Copy WASM demos into book output
        run: |
          mkdir -p artifacts/book/demos/pkg
          cp crates/web-app/pkg/web_app.js artifacts/book/demos/pkg/
          cp crates/web-app/pkg/web_app_bg.wasm artifacts/book/demos/pkg/
          cp crates/web-app/static/demos/*.html artifacts/book/demos/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: artifacts/book/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
