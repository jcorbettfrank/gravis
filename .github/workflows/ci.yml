name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (sim-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb654d5902ceb48146f7 # stable

      - name: Cache cargo registry + build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-test-${{ runner.os }}-

      - name: Run sim-core tests
        run: cargo test -p sim-core

  build-native:
    name: Build (native)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb654d5902ceb48146f7 # stable

      - name: Cache cargo registry + build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-native-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-native-${{ runner.os }}-

      - name: Build native-app + headless (release)
        run: cargo build --release -p native-app -p headless

  build-wasm:
    name: Build (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb654d5902ceb48146f7 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: cargo install wasm-pack --version "0.14.0"

      - name: Build web-app
        run: cd crates/web-app && wasm-pack build --target web --release

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb654d5902ceb48146f7 # stable
        with:
          components: clippy

      - name: Cache cargo registry + build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-clippy-${{ runner.os }}-

      - name: Clippy (sim-core + render-core + headless)
        run: cargo clippy -p sim-core -p render-core -p headless -- -D warnings

  book:
    name: Build book
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb654d5902ceb48146f7 # stable

      - name: Cache cargo tools
        id: cache-tools
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-katex
          key: cargo-book-tools-${{ runner.os }}-mdbook-0.4.47-katex-0.9.4

      - name: Install mdBook
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install mdbook --version "0.4.47"

      - name: Install mdbook-katex
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: cargo install mdbook-katex --version "0.9.4"

      - name: Build book
        run: mdbook build book/
